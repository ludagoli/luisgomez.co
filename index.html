<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Room - Ideas de nombre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #0a0a0a;
      color: #f0e6d3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a7a65;
      margin-bottom: 3rem;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }
    a {
      display: block;
      padding: 2rem 3rem;
      border: 1px solid #333;
      color: #d4a44a;
      text-decoration: none;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }
    a:hover {
      border-color: #d4a44a;
      background: rgba(212, 164, 74, 0.08);
    }
  </style>
</head>
<body>
  <h1>Ideas de nombre</h1>
  <div class="grid">
    <a href="/57rooms">57 Rooms</a>
    <a href="/bajollave">Bajo Llave</a>
  </div>
</body>
</html>
