<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>57 Rooms - Escape Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0a0a0a;
      color: #f0e6d3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139, 69, 19, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(184, 134, 11, 0.1) 0%, transparent 60%),
        #0a0a0a;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: bold;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .logo span {
      color: #d4a44a;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.5rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8a7a65;
      margin-bottom: 3rem;
    }

    .door-icon {
      width: 80px;
      height: 120px;
      border: 2px solid #d4a44a;
      border-radius: 4px 4px 0 0;
      margin: 0 auto 3rem;
      position: relative;
    }

    .door-icon::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d4a44a;
      position: absolute;
      right: 12px;
      top: 50%;
    }

    .cta {
      display: inline-block;
      padding: 1rem 3rem;
      border: 1px solid #d4a44a;
      color: #d4a44a;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .cta:hover {
      background: #d4a44a;
      color: #0a0a0a;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="door-icon"></div>
    <div class="logo"><span>57</span> Rooms</div>
    <p class="tagline">Escape Room Experience</p>
    <a href="#" class="cta">Proximamente</a>
  </div>
</body>
</html>
